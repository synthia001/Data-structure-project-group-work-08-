<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages · MkU Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0f; --surface: #13131c; --surface2: #1c1c2a; --border: #2a2a3e; --accent: #7c5cfc; --accent2: #fc5c9c; --text: #f0f0f8; --muted: #7a7a9a; --gradient: linear-gradient(135deg, #7c5cfc, #fc5c9c); }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.6; }
    .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.1; pointer-events: none; animation: drift 12s ease-in-out infinite alternate; }
    .blob1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; }
    .blob2 { width: 400px; height: 400px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -5s; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px,20px); } }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
    .nav-center { display: flex; gap: 0.25rem; background: var(--surface); padding: 6px; border-radius: 14px; border: 1px solid var(--border); }
    .nav-center a { color: var(--muted); font-size: 1.1rem; padding: 8px 14px; border-radius: 10px; transition: all 0.2s; display: flex; align-items: center; text-decoration: none; }
    .nav-center a:hover { color: var(--text); background: var(--surface2); }
    .nav-center a.active { color: var(--accent); background: var(--surface2); }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .nav-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; }
    .btn-icon { background: var(--surface); border: 1px solid var(--border); color: var(--muted); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.95rem; }
    .logout-btn { background: var(--surface); border: 1px solid var(--accent2); color: var(--accent2); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; }
    .logout-btn:hover { background: var(--accent2); color: #fff; }
    .messages-layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 64px); margin-top: 64px; }
    .inbox { border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
    .inbox-header { padding: 1.2rem 1.2rem 0.8rem; border-bottom: 1px solid var(--border); }
    .inbox-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; margin-bottom: 0.8rem; }
    .search-bar { display: flex; align-items: center; gap: 0.6rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 0.5rem 0.9rem; }
    .search-bar i { color: var(--muted); font-size: 0.85rem; }
    .search-bar input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; }
    .search-bar input::placeholder { color: var(--muted); }
    .convo-list { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
    .convo-item { display: flex; align-items: center; gap: 0.85rem; padding: 0.8rem 1.2rem; cursor: pointer; transition: background 0.15s; }
    .convo-item:hover, .convo-item.active { background: var(--surface2); }
    .convo-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; position: relative; }
    .online-dot { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #22c55e; border-radius: 50%; border: 2px solid var(--surface); }
    .convo-info { flex: 1; min-width: 0; }
    .convo-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.88rem; }
    .convo-preview { color: var(--muted); font-size: 0.78rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .convo-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .convo-time { color: var(--muted); font-size: 0.7rem; }
    .unread-badge { background: var(--accent); color: #fff; font-size: 0.65rem; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .chat-area { display: flex; flex-direction: column; background: var(--bg); }
    .chat-header { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface); }
    .chat-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; }
    .chat-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
    .chat-status { color: #22c55e; font-size: 0.72rem; }
    .chat-actions { margin-left: auto; display: flex; gap: 0.5rem; }
    .chat-action-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .chat-action-btn:hover { color: var(--text); border-color: var(--accent); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg { display: flex; gap: 0.7rem; max-width: 70%; }
    .msg.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.7rem; flex-shrink: 0; align-self: flex-end; }
    .msg-bubble { padding: 0.7rem 1rem; border-radius: 18px; font-size: 0.86rem; line-height: 1.5; }
    .msg.theirs .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.mine .msg-bubble { background: var(--gradient); color: #fff; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 0.68rem; color: var(--muted); margin-top: 4px; text-align: right; }
    .msg.theirs .msg-time { text-align: left; }
    .date-divider { text-align: center; color: var(--muted); font-size: 0.73rem; margin: 0.5rem 0; }
    .chat-input-area { padding: 1rem 1.5rem; border-top: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 0.75rem; }
    .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 0.7rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.87rem; outline: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: var(--accent); }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn { background: var(--gradient); border: none; color: #fff; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; }
    .attach-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .attach-btn:hover { color: var(--accent); border-color: var(--accent); }
    @media (max-width: 700px) { .nav-center { display: none; } .messages-layout { grid-template-columns: 1fr; } .chat-area { display: none; } }
  </style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<nav>
  <a class="logo" href="index.html">MkU Connect</a>
  <div class="nav-center">
    <a href="index.html"><i class="fas fa-house"></i></a>
    <a href="explore.html"><i class="fas fa-compass"></i></a>
    <a href="reels.html"><i class="fas fa-film"></i></a>
    <a href="messages.html" class="active"><i class="fas fa-paper-plane"></i></a>
    <a href="notifications.html"><i class="fas fa-bell"></i></a>
  </div>
  <div class="nav-right">
    <button class="btn-icon"><i class="fas fa-plus"></i></button>
    <div class="nav-avatar" id="navInitials">MM</div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-right-from-bracket"></i></button>
  </div>
</nav>
<div class="messages-layout">
  <div class="inbox">
    <div class="inbox-header">
      <div class="inbox-title">Messages</div>
      <div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="Search conversations…"/></div>
    </div>
    <div class="convo-list" id="convoList"></div>
  </div>
  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-avatar" id="chatAvatar" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">AO</div>
      <div><div class="chat-name" id="chatName">Ama Owusu</div><div class="chat-status">● Online</div></div>
      <div class="chat-actions">
        <button class="chat-action-btn"><i class="fas fa-phone"></i></button>
        <button class="chat-action-btn"><i class="fas fa-video"></i></button>
        <button class="chat-action-btn"><i class="fas fa-ellipsis"></i></button>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <button class="attach-btn"><i class="fas fa-image"></i></button>
      <input class="chat-input" id="chatInput" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>
<script>
  function logout() { localStorage.removeItem('mku_token'); window.location.href = 'login.html'; }

  const API = 'http://127.0.0.1:8080';
  const token = localStorage.getItem('mku_token');

  async function loadConversations() {
    const list = document.getElementById('convoList');
    list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem;font-size:0.85rem">Loading…</div>';
    try {
      const res = await fetch(`${API}/conversations`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      list.innerHTML = '';
      if (!data.length) {
        list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem;font-size:0.85rem">No messages yet</div>';
        return;
      }
      data.forEach((c, i) => {
        const ini = (c.name||'U').split(' ').map(w=>w[0]).join('').toUpperCase();
        const div = document.createElement('div');
        div.className = 'convo-item' + (i===0?' active':'');
        div.innerHTML = `
          <div class="convo-avatar" style="background:var(--gradient)">${ini}</div>
          <div class="convo-info">
            <div class="convo-name">${c.name||c.username}</div>
            <div class="convo-preview">${c.last_message||'Say hello!'}</div>
          </div>
          <div class="convo-meta"><span class="convo-time">${c.time||''}</span></div>`;
        div.onclick = () => {
          document.querySelectorAll('.convo-item').forEach(el=>el.classList.remove('active'));
          div.classList.add('active');
          loadChat(c);
        };
        list.appendChild(div);
        if (i===0) loadChat(c);
      });
    } catch(e) {
      list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem;font-size:0.85rem">Could not load conversations</div>';
    }
  }

  async function loadChat(c) {
    document.getElementById('chatName').textContent = c.name||c.username;
    const ini = (c.name||'U').split(' ').map(w=>w[0]).join('').toUpperCase();
    document.getElementById('chatAvatar').textContent = ini;
    const msgs = document.getElementById('chatMessages');
    msgs.innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem;font-size:0.85rem">Loading messages…</div>';
    try {
      const res = await fetch(`${API}/conversations/${c.id}/messages`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      msgs.innerHTML = '';
      if (!data.length) {
        msgs.innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem;font-size:0.85rem">No messages yet. Say hello! 👋</div>';
        return;
      }
      data.forEach(m => addBubble(m.content, m.is_mine, m.created_at, ini));
    } catch(e) {
      msgs.innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem;font-size:0.85rem">Could not load messages</div>';
    }
    window._activeChatId = c.id;
  }

  function addBubble(text, mine, time, ini, scroll=true) {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `msg ${mine?'mine':'theirs'}`;
    const t = time ? new Date(time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    div.innerHTML = `
      ${!mine?`<div class="msg-avatar" style="background:var(--gradient)">${ini}</div>`:''}
      <div><div class="msg-bubble">${text}</div><div class="msg-time">${t}</div></div>`;
    msgs.appendChild(div);
    if(scroll) msgs.scrollTop = msgs.scrollHeight;
  }

  async function sendMsg() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !window._activeChatId) return;
    input.value = '';
    addBubble(text, true, new Date().toISOString(), '');
    try {
      await fetch(`${API}/conversations/${window._activeChatId}/messages`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: text })
      });
    } catch(e) {}
  }

  document.getElementById('chatInput').addEventListener('keydown', e => { if(e.key==='Enter') sendMsg(); });
  loadConversations();
</script>
</body>
</html>
