<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MkU Connect — Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131c;
      --surface2: #1c1c2a;
      --border: #2a2a3e;
      --accent: #7c5cfc;
      --accent2: #fc5c9c;
      --text: #f0f0f8;
      --muted: #7a7a9a;
      --gradient: linear-gradient(135deg, #7c5cfc, #fc5c9c);
      --glow: 0 0 40px rgba(124,92,252,0.25);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 2rem 1rem;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.13;
      pointer-events: none;
      animation: drift 10s ease-in-out infinite alternate;
    }
    .blob1 { width: 500px; height: 500px; background: #7c5cfc; top: -150px; right: -150px; }
    .blob2 { width: 400px; height: 400px; background: #fc5c9c; bottom: -100px; left: -100px; animation-delay: -4s; }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(25px, 20px); }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 10;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      box-shadow: var(--glow);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 0.3rem;
    }

    .tagline {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
    }
    input::placeholder { color: var(--muted); }

    .strength-bar {
      height: 3px;
      border-radius: 4px;
      margin-top: 6px;
      background: var(--border);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

    .btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 12px;
      background: var(--gradient);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .switch {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .switch a:hover { text-decoration: underline; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.83rem;
      margin-bottom: 1rem;
      display: none;
    }
    .alert.error {
      background: rgba(252, 92, 156, 0.12);
      border: 1px solid rgba(252, 92, 156, 0.3);
      color: #fc5c9c;
    }
    .alert.success {
      background: rgba(92, 240, 252, 0.1);
      border: 1px solid rgba(92, 240, 252, 0.3);
      color: #5cf0fc;
    }
    .alert.show { display: block; animation: slideUp 0.3s ease; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .terms {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-top: 1rem;
    }
    .terms a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
  <div class="logo">MkU Connect</div>
  <div class="tagline">Join the community today.</div>

  <div class="form-title">Create your account </div>

  <div class="alert error" id="errorMsg"></div>
  <div class="alert success" id="successMsg"></div>

  <div class="row">
    <div class="field">
      <label>First Name</label>
      <input type="text" id="firstName" placeholder="First name"/>
    </div>
    <div class="field">
      <label>Last Name</label>
      <input type="text" id="lastName" placeholder="Last name"/>
    </div>
  </div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Choose a username" autocomplete="username"/>
  </div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Create a strong password" oninput="checkStrength(this.value)"/>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel"></div>
  </div>

  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat your password"/>
  </div>

  <button class="btn" id="registerBtn" onclick="handleRegister()">Create Account</button>

  <div class="terms">
    By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
  </div>

  <div class="divider">or</div>

  <div class="switch">
    Already have an account? <a href="login.html">Log in</a>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8080';

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('successMsg').classList.remove('show');
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('errorMsg').classList.remove('show');
  }

  function setLoading(loading) {
    const btn = document.getElementById('registerBtn');
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span>Creating account…'
      : 'Create Account';
  }

  function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { pct: '0%',   color: 'transparent', text: '' },
      { pct: '25%',  color: '#fc5c9c',     text: 'Weak' },
      { pct: '50%',  color: '#f97316',     text: 'Fair' },
      { pct: '75%',  color: '#eab308',     text: 'Good' },
      { pct: '100%', color: '#10b981',     text: 'Strong 💪' },
    ];
    const l = levels[score];
    fill.style.width = l.pct;
    fill.style.background = l.color;
    label.textContent = l.text;
  }

  async function handleRegister() {
    const firstName     = document.getElementById('firstName').value.trim();
    const lastName      = document.getElementById('lastName').value.trim();
    const username      = document.getElementById('username').value.trim();
    const email         = document.getElementById('email').value.trim();
    const password      = document.getElementById('password').value;
    const confirmPwd    = document.getElementById('confirmPassword').value;

    if (!firstName || !lastName || !username || !email || !password || !confirmPwd) {
      showError('Please fill in all fields.');
      return;
    }
    if (password !== confirmPwd) {
      showError('Passwords do not match.');
      return;
    }
    if (password.length < 6) {
      showError('Password must be at least 6 characters.');
      return;
    }

    setLoading(true);

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          first_name: firstName,
          last_name: lastName,
          username,
          email,
          password
        })
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || 'Registration failed. Try a different username or email.');
        return;
      }

      showSuccess('Account created! Redirecting to login…');
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);

    } catch (err) {
      showError('Cannot reach server. Make sure your backend is running.');
    } finally {
      setLoading(false);
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleRegister();
  });
</script>
</body>
</html>
