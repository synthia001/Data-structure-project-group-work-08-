<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore · MkU Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0f; --surface: #13131c; --surface2: #1c1c2a; --border: #2a2a3e; --accent: #7c5cfc; --accent2: #fc5c9c; --text: #f0f0f8; --muted: #7a7a9a; --gradient: linear-gradient(135deg, #7c5cfc, #fc5c9c); }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-center { display: flex; gap: 0.25rem; background: var(--surface); padding: 6px; border-radius: 14px; border: 1px solid var(--border); }
    .nav-center a { color: var(--muted); font-size: 1.1rem; padding: 8px 14px; border-radius: 10px; transition: all 0.2s; display: flex; align-items: center; text-decoration: none; }
    .nav-center a.active { color: var(--accent); background: var(--surface2); }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .nav-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; }
    .logout-btn { background: var(--surface); border: 1px solid var(--accent2); color: var(--accent2); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.95rem; }
    .btn-icon { background: var(--surface); border: 1px solid var(--border); color: var(--muted); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.95rem; }

    .page { max-width: 800px; margin: 0 auto; padding: 84px 1.5rem 2rem; }
    .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; margin-bottom: 0.3rem; }
    .page-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

    .search-bar { display: flex; align-items: center; gap: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 0.8rem 1.2rem; margin-bottom: 1.5rem; }
    .search-bar input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 0.95rem; font-family: 'DM Sans', sans-serif; }
    .search-bar input::placeholder { color: var(--muted); }

    .categories { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .cat-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 7px 18px; border-radius: 50px; font-size: 0.83rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .cat-btn.active, .cat-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; margin-bottom: 1rem; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 2.5rem; }
    .grid-item { border-radius: 16px; overflow: hidden; aspect-ratio: 1; position: relative; cursor: pointer; }
    .grid-item:first-child { grid-column: span 2; aspect-ratio: 2/1; }
    .grid-bg { width: 100%; height: 100%; min-height: 120px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; transition: transform 0.3s; }
    .grid-item:hover .grid-bg { transform: scale(1.05); }
    .grid-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 0.75rem; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; }

    .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
    .person-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 1.2rem; text-align: center; }
    .person-avatar { width: 54px; height: 54px; border-radius: 50%; margin: 0 auto 0.7rem; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; }
    .person-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; }
    .person-handle { color: var(--muted); font-size: 0.73rem; margin: 0.2rem 0 0.8rem; }
    .follow-btn { background: none; border: 1px solid var(--accent); color: var(--accent); width: 100%; padding: 5px; border-radius: 8px; cursor: pointer; font-size: 0.78rem; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .follow-btn:hover { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">MkU Connect</a>
  <div class="nav-center">
    <a href="index.html"><i class="fas fa-house"></i></a>
    <a href="explore.html" class="active"><i class="fas fa-compass"></i></a>
    <a href="reels.html"><i class="fas fa-film"></i></a>
    <a href="messages.html"><i class="fas fa-paper-plane"></i></a>
    <a href="notifications.html"><i class="fas fa-bell"></i></a>
  </div>
  <div class="nav-right">
    <button class="btn-icon"><i class="fas fa-plus"></i></button>
    <div class="nav-avatar">MM</div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-right-from-bracket"></i></button>
  </div>
</nav>

<div class="page">
  <div class="page-title">🔍 Explore</div>
  <div class="page-sub">Discover people, posts and trends</div>

  <div class="search-bar">
    <i class="fas fa-search" style="color:var(--muted)"></i>
    <input type="text" placeholder="Search people, tags, topics…"/>
  </div>

  <div class="categories">
    <button class="cat-btn active">All</button>
    <button class="cat-btn">🎵 Music</button>
    <button class="cat-btn">🎨 Art</button>
    <button class="cat-btn">💻 Tech</button>
    <button class="cat-btn">🌍 Travel</button>
    <button class="cat-btn">🍕 Food</button>
    <button class="cat-btn">💪 Fitness</button>
  </div>

  <div class="section-title">Trending</div>
  <div class="grid">
    <div class="grid-item"><div class="grid-bg" style="background:linear-gradient(135deg,#7c5cfc,#fc5c9c)">🔥</div><div class="grid-label">#MkUConnect</div></div>
    <div class="grid-item"><div class="grid-bg" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">🎵</div><div class="grid-label">#Afrobeats</div></div>
    <div class="grid-item"><div class="grid-bg" style="background:linear-gradient(135deg,#10b981,#3b82f6)">🌍</div><div class="grid-label">#GhanaVibes</div></div>
    <div class="grid-item"><div class="grid-bg" style="background:linear-gradient(135deg,#8b5cf6,#ec4899)">🎨</div><div class="grid-label">#AfricanArt</div></div>
    <div class="grid-item"><div class="grid-bg" style="background:linear-gradient(135deg,#0ea5e9,#6366f1)">💻</div><div class="grid-label">#BuildInPublic</div></div>
  </div>

  <div class="section-title">People to Follow</div>
  <div class="people-grid" id="peopleGrid"></div>
</div>

<script>
  function logout() { localStorage.removeItem('mku_token'); window.location.href = 'login.html'; }

  const API = 'http://127.0.0.1:8080';
  const token = localStorage.getItem('mku_token');

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  async function loadPeople() {
    const grid = document.getElementById('peopleGrid');
    grid.innerHTML = '<div style="color:var(--muted);font-size:0.85rem">Loading…</div>';
    try {
      const res = await fetch(`${API}/users/suggestions`, { headers: { 'Authorization': `Bearer ${token}` } });
      const users = await res.json();
      grid.innerHTML = '';
      if (!users.length) {
        grid.innerHTML = '<div style="color:var(--muted);font-size:0.85rem">No suggestions yet</div>';
        return;
      }
      const colors = ['linear-gradient(135deg,#f59e0b,#ef4444)','linear-gradient(135deg,#10b981,#3b82f6)','linear-gradient(135deg,#8b5cf6,#ec4899)','linear-gradient(135deg,#0ea5e9,#6366f1)','linear-gradient(135deg,#f97316,#84cc16)'];
      users.forEach((u, i) => {
        const name = u.full_name || u.username;
        const ini = name.split(' ').map(w=>w[0]).join('').toUpperCase();
        grid.innerHTML += `
          <div class="person-card">
            <div class="person-avatar" style="background:${colors[i%colors.length]}">${ini}</div>
            <div class="person-name">${name}</div>
            <div class="person-handle">@${u.username}</div>
            <button class="follow-btn" onclick="followUser(this,${u.id})">Follow</button>
          </div>`;
      });
    } catch(e) {
      grid.innerHTML = '<div style="color:var(--muted);font-size:0.85rem">Could not load suggestions</div>';
    }
  }

  async function followUser(btn, userId) {
    const following = btn.textContent === 'Following';
    btn.textContent = following ? 'Follow' : 'Following';
    try {
      await fetch(`${API}/users/${userId}/follow`, {
        method: following ? 'DELETE' : 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
    } catch(e) {}
  }

  loadPeople();
</script>

</body>
</html>
